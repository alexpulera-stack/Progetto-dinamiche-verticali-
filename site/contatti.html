<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contatti | Dinamiche Verticali Formazione</title>

    <link rel="stylesheet" href="../style/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <img src="../img/logo.png" class="logo" alt="Logo" />

        <ul class="nav-links">
          <li><a href="home.html">Home</a></li>
          <li><a href="formazione.html">Formazione</a></li>
          <li><a href="contatti.html">Contatti</a></li>
        </ul>
      </div>
    </nav>

    <section class="contact-info">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-card">
            <h3>📧 Email</h3>
            <p>info@dvformazione.it</p>
          </div>

          <div class="contact-card">
            <h3>📱 Telefono</h3>
            <p>+39 000 000 0000</p>
          </div>

          <div class="contact-card">
            <h3>📍 Sede</h3>
            <p>Torino, Italia</p>
          </div>
        </div>
      </div>
    </section>
    <section class="map-section">
      <div class="container">
        <h2 class="conatti">Vieni a trovarci</h2>
        <p>La nostra sede si trova a Torino.</p>
        <!--iframe viene usato x racchiudere una piccola paginetta di un altro sito dentro un altro rendendolo intuitivo rendirizzandoti al luogo-->
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2754.744444444444!2d7.673333333333333!3d45.06666666666667!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47886c9c9c9c9c9c%3A0x47886c9c9c9c9c9c!2sVia+Giovanni+Battista+Feroggio%2C+54%2C+10129+Torino%2C+TO!5e0!3m2!1sit!2sit!4v1618888888888!5m2!1sit!2sit"
          loading="lazy"
          width="100%"
          height="400"
          style="border: 0"
          loading="lazy"
          allowfullscreen=""
        >
        </iframe>
      </div>
    </section>
    <section class="contact-form-section">
      <div class="container">
        <div class="hero-contact-card">
          <h2>Richiedi Informazioni</h2>

          <form>
            <input type="text" placeholder="Nome e Cognome" />

            <input type="email" placeholder="Email" />

            <input type="tel" placeholder="Telefono" />

            <textarea placeholder="Scrivi il tuo messaggio"> </textarea>

            <button class="btn-primary">Invia Richiesta</button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
